name: Sync Upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: git remote add upstream https://github.com/pcvelz/superpowers.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
          else
            echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits."
          fi
      - name: Rebase on upstream
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          if ! git rebase upstream/main; then
            git rebase --abort
            echo "::error::Rebase failed due to conflicts. Resolve manually: git fetch upstream && git rebase upstream/main"
            exit 1
          fi
      - name: Push rebased changes
        if: steps.check.outputs.already_up_to_date == 'false'
        run: git push origin HEAD:main --force-with-lease
